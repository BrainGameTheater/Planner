<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week At-A-Glance</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            background-image:
                linear-gradient(rgba(200, 200, 200, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 200, 200, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
            background-color: white;
        }

        .week-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .day-box {
            background-color: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 180px;
        }

        .weekend-box {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .weekend-day {
            background-color: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 180px;
        }

        .day-header {
            font-weight: bold;
            font-size: 1.3em;
            color: #333;
            margin-bottom: 5px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ddd;
        }

        .day-date {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            margin: 6px 0;
            font-size: 0.9em;
        }

        .task-item input[type="checkbox"] {
            margin-right: 8px;
            margin-top: 2px;
            cursor: pointer;
        }

        .task-item label {
            cursor: pointer;
            flex: 1;
        }

        .task-item.completed label {
            color: #999;
            text-decoration: line-through;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85em;
            resize: vertical;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Week At-A-Glance: [Update Week Dates]</h1>

        <div class="week-grid">

            <div class="day-box">
                <div class="day-header">Monday</div>
                <div class="day-date">[Date]</div>
                <textarea placeholder="Tasks and notes for Monday..."></textarea>
            </div>

            <div class="day-box">
                <div class="day-header">Tuesday</div>
                <div class="day-date">[Date]</div>
                <textarea placeholder="Tasks and notes for Tuesday..."></textarea>
            </div>

            <div class="day-box">
                <div class="day-header">Wednesday</div>
                <div class="day-date">[Date]</div>
                <textarea placeholder="Tasks and notes for Wednesday..."></textarea>
            </div>

            <div class="day-box">
                <div class="day-header">Thursday</div>
                <div class="day-date">[Date]</div>
                <textarea placeholder="Tasks and notes for Thursday..."></textarea>
            </div>

            <div class="day-box">
                <div class="day-header">Friday</div>
                <div class="day-date">[Date]</div>
                <textarea placeholder="Tasks and notes for Friday..."></textarea>
            </div>

            <div class="day-box" style="background-color: #fffbea;">
                <div class="day-header" style="color: #856404;">&#128204; Week Notes</div>
                <textarea placeholder="Goals, priorities, or notes for the week..." style="background-color: #fffbea;"></textarea>
            </div>

            <div class="weekend-box">
                <div class="weekend-day" style="background-color: #f0f8ff;">
                    <div class="day-header" style="color: #1e3a8a;">Saturday</div>
                    <div class="day-date">[Date]</div>
                    <textarea placeholder="Tasks and notes for Saturday..." style="background-color: #f0f8ff;"></textarea>
                </div>

                <div class="weekend-day" style="background-color: #f0f8ff;">
                    <div class="day-header" style="color: #1e3a8a;">Sunday</div>
                    <div class="day-date">[Date]</div>
                    <textarea placeholder="Tasks and notes for Sunday..." style="background-color: #f0f8ff;"></textarea>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.querySelectorAll('.task-item input[type="checkbox"]').forEach(function(checkbox) {
            checkbox.addEventListener('change', function() {
                var taskDiv = this.parentElement;
                if (this.checked) {
                    taskDiv.classList.add('completed');
                } else {
                    taskDiv.classList.remove('completed');
                }
            });
        });
    </script>
</body>
</html>
